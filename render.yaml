# Blueprint Render: conecte o repositório que contém SOMENTE o backend na raiz.
# https://dashboard.render.com/blueprint/new?repo=<URL_HTTPS_DO_REPO>

databases:
  - name: album-db
    databaseName: album
    user: album
    plan: free

services:
  - type: web
    name: album-copa-2026-api
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: album-db
          property: connectionString
      - key: CLERK_SECRET_KEY
        sync: false
      - key: FRONTEND_ORIGINS
        sync: false
